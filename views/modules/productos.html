<div class="productos-container">

    <div class="titulo">

        <h2>Gestión de Productos</h2>

        <button id="btnNuevoProducto">
            <i class="fa-solid fa-plus"></i>
            Nuevo Producto
        </button>

    </div>

    <div class="busqueda">

        <input
            type="text"
            id="txtBuscar"
            placeholder="Buscar producto..."
        >

    </div>

    <table id="tablaProductos">

        <thead>

            <tr>

                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Marca</th>
                <th>Stock</th>
                <th>Estado</th>
                <th>Acciones</th>

            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>

</div>

<!-- Modal -->

<div class="modal" id="modalProducto">

    <div class="modal-content">

        <h3>Nuevo Producto</h3>

        <form id="formProducto">

            <input type="hidden" id="idProducto">

            <label>Categoría</label>
            <input type="number" id="idCategoria">

            <label>Nombre</label>
            <input type="text" id="nombre">

            <label>Descripción</label>
            <textarea id="descripcion"></textarea>

            <label>Precio</label>
            <input type="number" step="0.01" id="precio">

            <label>Marca</label>
            <input type="text" id="marca">

            <label>Stock</label>
            <input type="number" id="stock">

            <label>Stock mínimo</label>
            <input type="number" id="stockMinimo">

            <label>Estado</label>

            <select id="estado">

                <option value="A">Activo</option>
                <option value="I">Inactivo</option>

            </select>

            <div class="botones">

                <button type="submit">

                    Guardar

                </button>

                <button
                    type="button"
                    id="btnCerrar"
                >

                    Cancelar

                </button>

            </div>

        </form>

    </div>
<script src="/js/modules/productos.js"></script>
</div>
