<div class="clientes-container">

  <div class="page-header">
    <div>
      <p class="brand-mark">🥂 Capi House</p>
      <h1>Clientes</h1>
      <p class="subtitle">Libro de registro de personas y empresas</p>
    </div>
  </div>

  <div class="clientes-card">
    <div class="tabs">
      <button class="tab-btn active" onclick="filtrarPorTipo('Natural', this)">
        👤 Personas <span class="tab-count" id="count-natural">0</span>
      </button>
      <button class="tab-btn" onclick="filtrarPorTipo('Jurídico', this)">
        🏢 Empresas <span class="tab-count" id="count-juridico">0</span>
      </button>
      <button class="tab-btn" onclick="filtrarPorTipo('Todos', this)">
        📋 Todos <span class="tab-count" id="count-todos">0</span>
      </button>
    </div>

    <div class="toolbar">
      <div class="search-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="filtroBusqueda" class="search-input"
               placeholder="Buscar por nombre o documento..." onkeyup="filtrarTabla()">
      </div>
      <button onclick="abrirModal()" class="btn-yellow">➕ Nuevo cliente</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Documento</th>
          <th>Teléfono</th>
          <th>Ubicación</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaClientesBody"></tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none;">
      <span class="glass">🍸</span>
      <h4>Aún no hay nadie en el libro</h4>
      <p>Registra tu primer cliente para empezar.</p>
    </div>
  </div>
</div>

<div id="modalCliente" class="modal-overlay" style="display:none;">
  <div class="modal-content">
    <h3 id="modalTitulo">Registrar nuevo cliente</h3>
    <label class="field-label">Tipo de cliente</label>
    <select id="tipoCliente" class="field-select" onchange="cambiarFormulario()">
      <option value="NATURAL">Persona natural</option>
      <option value="JURIDICO">Empresa</option>
    </select>

    <div id="formNatural">
      <div class="field-row">
        <div class="field-wrap">
          <label class="field-label">DNI</label>
          <input class="field-input" id="f_dni" maxlength="8" placeholder="74839215" autocomplete="off">
          <div class="suggestions" id="sugerenciasDni"></div>
        </div>
        <div>
          <label class="field-label">Celular</label>
          <input class="field-input" id="f_celular_n" placeholder="987654321">
        </div>
      </div>
      <div class="field-row">
        <div class="field-wrap">
          <label class="field-label">Nombres</label>
          <input class="field-input" id="f_nombres" placeholder="Luis" autocomplete="off">
          <div class="suggestions" id="sugerenciasNombre"></div>
        </div>
        <div>
          <label class="field-label">Apellido paterno</label>
          <input class="field-input" id="f_apepat" placeholder="Pérez">
        </div>
      </div>
      <label class="field-label">Apellido materno</label>
      <input class="field-input" id="f_apemat" placeholder="Gómez">
      <label class="field-label">Dirección</label>
      <input class="field-input" id="f_direccion_n" placeholder="Av. Lima 123">
    </div>

    <div id="formJuridico" style="display:none;">
      <label class="field-label">RUC</label>
      <input class="field-input" id="f_ruc" maxlength="11" placeholder="20481234567">
      <label class="field-label">Razón social</label>
      <input class="field-input" id="f_razon" placeholder="Inversiones SAC">
      <div class="field-row">
        <div>
          <label class="field-label">Teléfono</label>
          <input class="field-input" id="f_telefono_j" placeholder="924538211">
        </div>
        <div>
          <label class="field-label">Dirección</label>
          <input class="field-input" id="f_direccion_j" placeholder="Av. Arequipa 108">
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button onclick="cerrarModal()" class="btn-ghost">Cancelar</button>
      <button onclick="guardarCliente()" class="btn-yellow">Guardar</button>
    </div>
  </div>
</div>
