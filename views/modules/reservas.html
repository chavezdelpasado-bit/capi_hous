<div class="reservas-container">
  <p class="brand-mark">🥂 Capi House</p>
  <p class="subtitle">Gestión de reservas y disponibilidad</p>

  <div class="reservas-card">
    <div class="tabs">
      <button class="tab-btn active" onclick="cambiarVista('tabla', this)">📋 Tabla</button>
      <button class="tab-btn" onclick="cambiarVista('calendario', this)">🗓️ Calendario</button>
    </div>

    <div class="toolbar">
      <div class="search-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="filtroBusquedaReserva" class="search-input"
               placeholder="Buscar por cliente..." onkeyup="filtrarReservas()">
      </div>
      <select id="filtroEstado" class="field-select filtro-estado" onchange="filtrarReservas()">
        <option value="Todos">Todos los estados</option>
        <option value="P">Pendiente</option>
        <option value="C">Confirmada</option>
        <option value="A">Atendida</option>
        <option value="X">Cancelada</option>
      </select>
      <button onclick="abrirModalReserva()" class="btn-yellow">➕ Nueva reserva</button>
    </div>

    <!-- VISTA TABLA -->
    <div id="vistaTabla">
      <table>
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Zona / Mesa</th>
            <th>Fecha y hora</th>
            <th>Personas</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaReservasBody"></tbody>
      </table>
      <div id="emptyStateReservas" class="empty-state" style="display:none;">
        <span class="glass">📅</span>
        <h4>No hay reservas registradas</h4>
        <p>Crea la primera reserva para empezar.</p>
      </div>
    </div>

    <!-- VISTA CALENDARIO -->
    <div id="vistaCalendario" style="display:none;">
      <div class="calendar-header">
        <button class="btn-icon" onclick="cambiarMes(-1)">◀</button>
        <h3 id="calendarioTitulo"></h3>
        <button class="btn-icon" onclick="cambiarMes(1)">▶</button>
      </div>
      <div class="calendar-grid" id="calendarioGrid"></div>
      <div id="listaDiaSeleccionado" class="dia-seleccionado"></div>
    </div>
  </div>
</div>

<!-- MODAL RESERVA -->
<div id="modalReserva" class="modal-overlay" style="display:none;">
  <div class="modal-content">
    <h3 id="modalReservaTitulo">Nueva reserva</h3>

    <label class="field-label">Cliente</label>
    <div class="field-wrap">
      <input class="field-input" id="r_cliente_busqueda" placeholder="Buscar por nombre o documento..." autocomplete="off">
      <div class="suggestions" id="sugerenciasClienteReserva"></div>
    </div>
    <input type="hidden" id="r_idCliente">
    <div id="r_cliente_seleccionado" class="cliente-chip" style="display:none;"></div>

    <div class="field-row">
      <div>
        <label class="field-label">Zona</label>
        <select class="field-select" id="r_idZona"></select>
      </div>
      <div>
        <label class="field-label">Mesa (opcional)</label>
        <select class="field-select" id="r_idMesa">
          <option value="">Sin asignar</option>
        </select>
      </div>
    </div>

    <div class="field-row">
      <div>
        <label class="field-label">Fecha y hora</label>
        <input class="field-input" type="datetime-local" id="r_fecha">
      </div>
      <div>
        <label class="field-label">Cantidad de personas</label>
        <input class="field-input" type="number" min="1" id="r_personas" placeholder="4">
      </div>
    </div>

    <div class="modal-actions">
      <button onclick="cerrarModalReserva()" class="btn-ghost">Cancelar</button>
      <button onclick="guardarReserva()" class="btn-yellow">Guardar reserva</button>
    </div>
  </div>
</div>
